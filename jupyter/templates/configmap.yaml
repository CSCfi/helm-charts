apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "fullname" . }}-rewrite-config
data:
  default.conf: |-
    upstream node {
      server localhost:8888;
    }
    server {
        server_name             _;
        listen                  8080;
        location / {
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header Host {{ .Values.ingress.host }};
            proxy_http_version    1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout    86400;
            proxy_pass http://node;
            proxy_redirect off;
            port_in_redirect off;
            auth_basic "Pebbles - Jupyter Login";
            auth_basic_user_file /etc/nginx/secrets/passwd;
        }
     }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "fullname" . }}-notebook-config
  labels:
    chart: "{{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}"
data:
  notebook_config.py: {{ include "notebook-config" . | quote }}
